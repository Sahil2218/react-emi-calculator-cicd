apiVersion: apps/v1
kind: Deployment
metadata:
  name: emi-calculator
  namespace: emi-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: emi-calculator
  template:
    metadata:
      labels:
        app: emi-calculator
    spec:
      containers:
        - name: emi-calculator
          image: ghcr.io/sahil2218/react-emi-calculator-cicd:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
